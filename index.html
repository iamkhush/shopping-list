<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List</title>
    <link rel="stylesheet" href="static/styles.css">
</head>
<body>
    <div class="container">
        <h1>Shopping List</h1>
        <div class="add-item">
            <input type="text" id="newItem" placeholder="Add new item" />
            <button onclick="addNewItem()">Add</button>
        </div>
        <div class="filter-controls">
            <button id="toggleFilter" onclick="toggleUncheckedFilter()">Show Unchecked Only</button>
        </div>
        <ul id="shopping-list" class="shopping-list"></ul>
    </div>
    <div class="offline-indicator">You are currently offline. Changes will sync when you're back online.</div>
    <script src="static/app.js">
    // Register service worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/shopping-list/sw.js')
                .then(registration => console.log('ServiceWorker registration successful'))
                .catch(err => console.log('ServiceWorker registration failed: ', err));
        });
    }
    </script>
</body>
</html>
